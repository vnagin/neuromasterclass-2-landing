<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>НАЗВАНИЕ ПРОДУКТА — LeadUp AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6C3FE8;
      --primary-dark: #5230C5;
      --accent: #00D4FF;
      --dark: #0D0D1A;
      --dark2: #14142B;
      --dark3: #1E1E3F;
      --text: #E8E8F0;
      --text-muted: #9898B0;
      --border: rgba(108, 63, 232, 0.25);
      --radius: 12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
    }

    /* NAVBAR */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(13,13,26,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    .nav-logo span { color: var(--accent); }
    .nav-cta {
      background: var(--primary); color: #fff; padding: 8px 20px;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      text-decoration: none; transition: background 0.2s;
    }
    .nav-cta:hover { background: var(--primary-dark); }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(108,63,232,0.3), transparent);
    }
    .hero-inner { max-width: 720px; }

    .hero-badge {
      display: inline-block;
      background: rgba(108,63,232,0.15);
      border: 1px solid rgba(108,63,232,0.4);
      color: var(--accent);
      font-size: 13px; font-weight: 600;
      padding: 6px 16px; border-radius: 100px;
      margin-bottom: 28px;
    }

    h1 {
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 24px;
    }
    h1 em { color: var(--accent); font-style: normal; }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: var(--text-muted);
      margin-bottom: 40px;
      max-width: 520px;
      margin-inline: auto;
    }

    .cta-btn {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 16px 40px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .cta-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }

    /* SECTION */
    section {
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 24px;
    }
    section h2 {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 40px;
      text-align: center;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 40px 24px;
      color: var(--text-muted);
      font-size: 14px;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--text-muted); text-decoration: none; }
  </style>
</head>
<body>

  <nav>
    <span class="nav-logo">LeadUp <span>AI</span></span>
    <a href="#cta" class="nav-cta">Записаться</a>
  </nav>

  <div class="hero">
    <div class="hero-inner">
      <div class="hero-badge">МЕТКА КАТЕГОРИИ</div>
      <h1>Заголовок <em>лендинга</em><br>здесь</h1>
      <p class="hero-sub">Подзаголовок — краткое описание ценности продукта в 1–2 предложениях.</p>
      <a href="#cta" class="cta-btn">Основной призыв к действию</a>
    </div>
  </div>

  <section id="features">
    <h2>Что вы получите</h2>
    <!-- Добавьте блоки с фичами -->
    <p style="color: var(--text-muted); text-align:center">TODO: добавить блоки</p>
  </section>

  <section id="cta" style="text-align:center">
    <h2>Готовы начать?</h2>
    <p style="color: var(--text-muted); margin-bottom: 32px">Краткий призыв к действию.</p>
    <a href="#" class="cta-btn">Записаться сейчас</a>
  </section>

  <footer>
    <p>&copy; 2026 LeadUp AI · <a href="/">Все лендинги</a></p>
  </footer>

</body>
</html>
